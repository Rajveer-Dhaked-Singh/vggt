defaults:
  - default_dataset.yaml
  - default_model.yaml
  - _self_

exp_name: exp001
img_size: 128
num_workers: 2
seed_value: 42
accum_steps: 4
patch_size: 14
val_epoch_freq: 1   # Set to 1 so you see validation results after the first epoch
max_img_per_gpu: 1
max_epochs: 1       # Changed from 10 to 1 for a single full pass

# --- FULL RUN SETTINGS ---
limit_train_batches: null   # Changed from 5 to null (Runs full dataset)
limit_val_batches: null     # Changed from 2 to null (Runs full validation)

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: True
      repeat_batch: False
      fix_img_num: 5
      img_nums: [2, 6]
      get_nearby: True
      allow_duplicate_img: True
      augs:
        cojitter: True
        cojitter_ratio: 0.3
        scales: [0.8, 1.2]
        aspects: [0.33, 1.0]
        color_jitter:
          brightness: 0.5
          contrast: 0.5
          saturation: 0.5
          hue: 0.1
          p: 0.9
        gray_scale: True
        gau_blur: False
      training: True
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      common_config: ${data.train.common_config}
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: /content/co3d_data
          CO3D_ANNOTATION_DIR: /content/co3d_annotations

  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: True
      fix_img_num: 4
      img_nums: [2, 5]
      get_nearby: True
      allow_duplicate_img: True
      augs:
        cojitter: False
        cojitter_ratio: 0.5
        scales: null
        aspects: [1.0, 1.0]
        color_jitter: null
        gray_scale: False
        gau_blur: False
      training: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      common_config: ${data.val.common_config}
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: test
          CO3D_DIR: /content/co3d_data
          CO3D_ANNOTATION_DIR: /content/co3d_annotations

logging:
  log_dir: logs
  log_visuals: False   # Keep False to save disk space
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth

checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 1000      # DO NOT CHANGE: Keeps your 3.4GB disk from crashing
  resume_checkpoint_path: null 
  save_weights_only: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: True
  allow_tf32: True

distributed:
  backend: "nccl"
  timeout_mins: 30
  find_unused_parameters: False
  gradient_as_bucket_view: true
  bucket_cap_mb: 25
  broadcast_buffers: true

optim_conf:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0001
    weight_decay: 1.0e-05
  options: null
  amp:
    enabled: true
    amp_dtype: float16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ""
        max_norm: 1.0
        norm_type: 2
